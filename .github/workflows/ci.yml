name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  code-style:
    name: Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check code style
        run: bash Scripts/CheckCodeStyle.sh

  windows-d3d12-render-smoke:
    name: Windows D3D12 Render Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build and validate viewport capture
        shell: pwsh
        run: .\Scripts\TestRender.ps1 -Configuration Debug -Action vs2022

      - name: Run engine tests
        shell: pwsh
        run: .\bin\Debug-windows-x86_64\EngineTests\EngineTests.exe

      - name: Run asset watch smoke
        shell: pwsh
        run: .\bin\Debug-windows-x86_64\Editor\Editor.exe --headless --asset-watch-smoke

      - name: Run glTF import smoke
        shell: pwsh
        run: .\bin\Debug-windows-x86_64\Editor\Editor.exe --headless --gltf-import-smoke

      - name: Run material asset smoke
        shell: pwsh
        run: .\bin\Debug-windows-x86_64\Editor\Editor.exe --headless --material-asset-smoke

      - name: Run project save/reopen smoke
        shell: pwsh
        run: .\bin\Debug-windows-x86_64\Editor\Editor.exe --headless --project-save-smoke

      - name: Run undo/redo smoke
        shell: pwsh
        run: .\bin\Debug-windows-x86_64\Editor\Editor.exe --headless --undo-redo-smoke

      - name: Upload viewport capture
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: editor-viewport-capture
          path: output/captures/editor-viewport.bmp
          if-no-files-found: ignore

  portable-headless-smoke:
    name: ${{ matrix.os }} Portable Headless Smoke
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev

      - name: Build portable target
        run: bash Scripts/Build.sh Debug gmake

      - name: Run engine tests
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ./bin/Debug-linux-x86_64-gmake/EngineTests/EngineTests
          else
            ./bin/Debug-macosx-x86_64-gmake/EngineTests/EngineTests
          fi

      - name: Run editor headless smoke
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ./bin/Debug-linux-x86_64-gmake/Editor/Editor --headless --smoke-test
          else
            ./bin/Debug-macosx-x86_64-gmake/Editor/Editor --headless --smoke-test
          fi

      - name: Run asset watch smoke
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ./bin/Debug-linux-x86_64-gmake/Editor/Editor --headless --asset-watch-smoke
          else
            ./bin/Debug-macosx-x86_64-gmake/Editor/Editor --headless --asset-watch-smoke
          fi

      - name: Run glTF import smoke
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ./bin/Debug-linux-x86_64-gmake/Editor/Editor --headless --gltf-import-smoke
          else
            ./bin/Debug-macosx-x86_64-gmake/Editor/Editor --headless --gltf-import-smoke
          fi

      - name: Run material asset smoke
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ./bin/Debug-linux-x86_64-gmake/Editor/Editor --headless --material-asset-smoke
          else
            ./bin/Debug-macosx-x86_64-gmake/Editor/Editor --headless --material-asset-smoke
          fi

      - name: Run project save/reopen smoke
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ./bin/Debug-linux-x86_64-gmake/Editor/Editor --headless --project-save-smoke
          else
            ./bin/Debug-macosx-x86_64-gmake/Editor/Editor --headless --project-save-smoke
          fi

      - name: Run undo/redo smoke
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ./bin/Debug-linux-x86_64-gmake/Editor/Editor --headless --undo-redo-smoke
          else
            ./bin/Debug-macosx-x86_64-gmake/Editor/Editor --headless --undo-redo-smoke
          fi

      - name: Run sandbox headless smoke
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ./bin/Debug-linux-x86_64-gmake/Sandbox/Sandbox --headless --smoke-test
          else
            ./bin/Debug-macosx-x86_64-gmake/Sandbox/Sandbox --headless --smoke-test
          fi
