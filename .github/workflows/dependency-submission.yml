name: Dependency Submission

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit-vendored-dependencies:
    name: Submit Vendored Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate dependency snapshot
        run: python3 Scripts/GenerateDependencySnapshot.py .github/dependency-graph/vendor-dependencies.json dependency-snapshot.json

      - name: Submit dependency snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/dependency-graph/snapshots" \
            --input dependency-snapshot.json
